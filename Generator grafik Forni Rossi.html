<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator grafiki dla wizytówki Forni Rossi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    gap: 24px;
    padding: 24px;
    align-items: flex-start;
  }

  /* ── EDITOR ── */
  .editor {
    background: #1e1e1e;
    border-radius: 14px;
    padding: 22px;
    width: 290px;
    flex-shrink: 0;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: sticky;
    top: 24px;
    border: 1px solid #2e2e2e;
  }

  .editor-logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .editor-logo .brand {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 900;
    color: #c8a45a;
    letter-spacing: 0.02em;
  }

  .editor-logo .sub {
    font-size: 10px;
    font-weight: 400;
    color: #666;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .editor label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    display: block;
    margin-bottom: 6px;
  }

  .editor textarea {
    width: 100%;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: #f0ebe0;
    background: #141414;
    resize: vertical;
    min-height: 80px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .editor textarea:focus { outline: none; border-color: #c8a45a; }

  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
  }

  .photo-option {
    border: 2px solid transparent;
    border-radius: 7px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    aspect-ratio: 1;
  }
  .photo-option:hover { transform: scale(1.05); }
  .photo-option.selected { border-color: #c8a45a; }
  .photo-option img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-option .check {
    position: absolute; top: 3px; right: 3px;
    width: 15px; height: 15px;
    background: #c8a45a; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .photo-option.selected .check { display: flex; }
  .photo-option .check svg { width: 8px; height: 8px; }

  .upload-btn {
    border: 1px dashed #444;
    border-radius: 7px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer;
    aspect-ratio: 1;
    color: #555; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: border-color 0.2s, color 0.2s;
    background: #141414;
  }
  .upload-btn:hover { border-color: #c8a45a; color: #c8a45a; }
  .upload-btn svg { width: 16px; height: 16px; }
  #file-input { display: none; }

  .export-btn {
    background: linear-gradient(135deg, #c8a45a, #a8833a);
    color: #1a1410;
    border: none; border-radius: 9px; padding: 13px;
    font-family: 'Lato', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; width: 100%;
    transition: opacity 0.2s;
    letter-spacing: 0.03em;
  }
  .export-btn:hover { opacity: 0.88; }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint { font-size: 11px; color: #444; line-height: 1.5; text-align: center; }
  .divider { height: 1px; background: #2a2a2a; }

  /* ── PREVIEW AREA ── */
  .preview-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 10px;
    min-width: 0;
  }

  .preview-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: #444;
  }

  .scale-wrapper { overflow: hidden; }

  /* ── CARD: 958×610 ── */
  .card {
    width: 958px; height: 610px;
    background: #18130e;
    position: relative; overflow: hidden;
    transform-origin: top left;
    font-family: 'Lato', sans-serif;
  }

  /* Photo fills right portion */
  .card-photo-bg {
    position: absolute;
    right: 0; top: 0;
    width: 460px; height: 610px;
    overflow: hidden;
  }

  .card-photo-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }

  /* Gradient overlay blending photo into dark left */
  .card-photo-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #18130e 0%, rgba(24,19,14,0.3) 60%, rgba(24,19,14,0) 100%);
  }

  /* Subtle texture overlay on whole card */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(200,164,90,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 2;
  }

  /* Left content */
  .card-left {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 530px;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 56px 64px;
    z-index: 3;
  }

  /* Small "Forni Rossi" brand tag */
  .card-brand {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c8a45a;
    margin-bottom: 24px;
  }

  .card-accent {
    width: 44px; height: 2px;
    background: #c8a45a;
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 700;
    line-height: 1.12;
    color: #f5f0e8;
    letter-spacing: -0.01em;
    text-wrap: pretty;
  }

  .card-location {
    position: absolute;
    bottom: 40px; left: 64px;
    display: flex; align-items: center; gap: 8px;
    z-index: 3;
  }
  .card-location span {
    font-size: 14px; font-weight: 300;
    color: #8a7a60;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- EDITOR -->
<div class="editor">
  <div class="editor-logo">
    <div class="brand">Forni Rossi</div>
    <div class="sub">Generator grafiki · wizytówka Google</div>
  </div>

  <div class="divider"></div>

  <div>
    <label>Tytuł grafiki</label>
    <textarea id="title-input" placeholder="Wpisz tekst posta...">Pizza neapolitańska – czym różni się od zwykłej pizzy?</textarea>
  </div>

  <div class="divider"></div>

  <div>
    <label>Wybierz zdjęcie</label>
    <div class="photo-grid" id="photo-grid"></div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="divider"></div>

  <button class="export-btn" onclick="exportPNG()">⬇ Pobierz PNG (958×610)</button>
  <p class="hint">Podgląd na żywo. Kliknij zdjęcie lub wgraj własne.</p>
</div>

<!-- PREVIEW -->
<div class="preview-area">
  <div class="preview-label">Podgląd grafiki</div>
  <div class="scale-wrapper" id="scale-wrapper">
    <div class="card" id="card">
      <div class="card-photo-bg">
        <img id="card-photo" src="uploads/11-scaled.jpg" alt="">
      </div>

      <div class="card-left">
        <div class="card-brand">Forni Rossi · Poznań</div>
        <div class="card-accent"></div>
        <div class="card-title" id="card-title-el">Pizza neapolitańska – czym różni się od zwykłej pizzy?</div>
      </div>

      <div class="card-location">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#8a7a60"/>
        </svg>
        <span>Naramowicka 92, Poznań</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const PHOTOS = [
  { src: 'uploads/11-scaled.jpg',   label: 'Pizza 1' },
  { src: 'uploads/12-scaled.jpg',   label: 'Lasagne' },
  { src: 'uploads/1-scaled.jpg',    label: 'Arancini' },
  { src: 'uploads/21-scaled.jpg',   label: 'Pizza 2' },
  { src: 'uploads/41-scaled.jpg',   label: 'Calzone' },
  { src: 'uploads/3-scaled.jpg',    label: 'Sałatka' },
  { src: 'uploads/31-scaled.jpg',   label: 'Pizza 3' },
  { src: 'uploads/2-scaled.jpg',    label: 'Pasta 1' },
  { src: 'uploads/4-scaled.jpg',    label: 'Pasta 2' },
  { src: 'uploads/51-scaled.jpg',   label: 'Pizza 4' },
  { src: 'uploads/52-scaled.jpg',   label: 'Pasta 3' },
  { src: 'uploads/5-scaled.jpg',    label: 'Pizza 5' },
  { src: 'uploads/71-scaled.jpg',   label: 'Owoce morza' },
  { src: 'uploads/62-scaled.jpg',   label: 'Ośmiornica' },
  { src: 'uploads/6-scaled.jpg',    label: 'Pizza 6' },
  { src: 'uploads/61-scaled.jpg',   label: 'Cannolo' },
];

function buildPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  PHOTOS.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-option' + (i === 0 ? ' selected' : '');
    div.innerHTML = `<img src="${p.src}" alt="${p.label}" onerror="this.parentElement.style.display='none'">
      <div class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#1a1410" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    div.addEventListener('click', () => selectPhoto(p.src, div));
    grid.appendChild(div);
  });

  const uploadLabel = document.createElement('label');
  uploadLabel.className = 'upload-btn';
  uploadLabel.htmlFor = 'file-input';
  uploadLabel.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Własne`;
  grid.appendChild(uploadLabel);
}

function selectPhoto(src, el) {
  document.getElementById('card-photo').src = src;
  document.querySelectorAll('.photo-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const grid = document.getElementById('photo-grid');
  const uploadBtn = grid.lastElementChild;
  const prev = document.getElementById('custom-opt');
  if (prev) prev.remove();
  const div = document.createElement('div');
  div.className = 'photo-option selected';
  div.id = 'custom-opt';
  div.innerHTML = `<img src="${url}" alt="Własne">
    <div class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#1a1410" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
  div.addEventListener('click', () => selectPhoto(url, div));
  grid.insertBefore(div, uploadBtn);
  selectPhoto(url, div);
});

document.getElementById('title-input').addEventListener('input', function() {
  document.getElementById('card-title-el').textContent = this.value;
});

function scaleCard() {
  const availW = window.innerWidth - 290 - 24*3;
  const availH = window.innerHeight - 48;
  const scale = Math.min(availW / 958, availH / 610, 1);
  document.getElementById('card').style.transform = `scale(${scale})`;
  document.getElementById('scale-wrapper').style.width  = (958 * scale) + 'px';
  document.getElementById('scale-wrapper').style.height = (610 * scale) + 'px';
}
window.addEventListener('resize', scaleCard);
scaleCard();
buildPhotoGrid();

async function exportPNG() {
  const btn = document.querySelector('.export-btn');
  btn.textContent = '⏳ Generuję...';
  btn.disabled = true;

  const card = document.getElementById('card');
  const clone = card.cloneNode(true);
  clone.style.transform = 'none';
  clone.style.position = 'fixed';
  clone.style.top = '-700px';
  clone.style.left = '0';
  clone.style.width = '958px';
  clone.style.height = '610px';
  clone.style.zIndex = '-999';
  document.body.appendChild(clone);

  await new Promise(r => setTimeout(r, 200));

  try {
    const canvas = await html2canvas(clone, {
      width: 958, height: 610, scale: 1,
      useCORS: true, allowTaint: true, logging: false,
      backgroundColor: '#18130e',
      scrollX: 0, scrollY: 700,
    });

    const title = document.getElementById('title-input').value.slice(0, 50)
      .replace(/[^\w\sąćęłńóśźżĄĆĘŁŃÓŚŹŻ–-]/g, '').trim() || 'grafika';
    const link = document.createElement('a');
    link.download = 'Forni Rossi – ' + title + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    document.body.removeChild(clone);
    btn.textContent = '⬇ Pobierz PNG (958×610)';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
