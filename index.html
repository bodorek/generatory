<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generatory grafik</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 13px;
      color: #999;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 920px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e8e8e6;
      padding: 28px 28px 24px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.09);
      border-color: #d0d0cc;
    }

    .card-accent {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .card-type {
      font-size: 11px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card-arrow {
      margin-top: auto;
      font-size: 18px;
      color: #ccc;
      transition: color 0.18s, transform 0.18s;
      align-self: flex-end;
    }

    .card:hover .card-arrow {
      color: #888;
      transform: translateX(3px);
    }

    /* Kolory akcentów per karta */
    .card-forni .card-accent   { background: #c8a45a; }
    .card-medycyna .card-accent { background: #1a6e7a; }
    .card-drobina .card-accent  { background: #2a7bbf; }
    .card-cudimiod .card-accent { background: #e6b830; }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Generatory grafik</h1>
    <p>Wybierz klienta</p>
  </div>

  <div class="grid">

    <a class="card card-forni" href="Generator grafik Forni Rossi.html">
      <div class="card-accent"></div>
      <div class="card-name">Forni Rossi</div>
      <div class="card-type">Restauracja · Wizytówka Google</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-medycyna" href="Generator grafik Medycyna Kregoslupa.html">
      <div class="card-accent"></div>
      <div class="card-name">Medycyna Kręgosłupa</div>
      <div class="card-type">Medycyna · Wizytówka Google</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-drobina" href="Szablon grafik Bartosz Drobina.html">
      <div class="card-accent"></div>
      <div class="card-name">Bartosz Drobina</div>
      <div class="card-type">Fizjoterapia · Wizytówka Google</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-cudimiod" href="Generator grafik Cud i Miod.html">
      <div class="card-accent"></div>
      <div class="card-name">Cud i Miód</div>
      <div class="card-type">Fit Catering · Wizytówka Google</div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <div class="footer">bartek · generatory grafik</div>

</body>
</html>
