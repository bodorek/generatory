<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator grafiki dla wizytówki Bartosz Drobina</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d4d8;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    gap: 28px;
    padding: 28px;
    align-items: flex-start;
  }

  /* ── EDITOR PANEL ── */
  .editor {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 300px;
    flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: sticky;
    top: 28px;
  }

  .editor-title {
    font-size: 15px;
    font-weight: 900;
    color: #111;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .editor label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    display: block;
    margin-bottom: 6px;
  }

  .editor textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: #111;
    resize: vertical;
    min-height: 80px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .editor textarea:focus { outline: none; border-color: #2a7bbf; }

  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .photo-option {
    border: 2.5px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    aspect-ratio: 1;
  }
  .photo-option:hover { transform: scale(1.04); }
  .photo-option.selected { border-color: #2a7bbf; }
  .photo-option img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-option .check {
    position: absolute; top: 3px; right: 3px;
    width: 16px; height: 16px;
    background: #2a7bbf; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .photo-option.selected .check { display: flex; }
  .photo-option .check svg { width: 9px; height: 9px; }

  .upload-btn {
    border: 1.5px dashed #ccc;
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    cursor: pointer;
    aspect-ratio: 1;
    color: #bbb;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: border-color 0.2s, color 0.2s;
  }
  .upload-btn:hover { border-color: #2a7bbf; color: #2a7bbf; }
  .upload-btn svg { width: 18px; height: 18px; }
  #file-input { display: none; }

  .export-btn {
    background: #2a7bbf; color: #fff; border: none;
    border-radius: 10px; padding: 13px;
    font-family: 'Lato', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; width: 100%;
    transition: background 0.2s;
  }
  .export-btn:hover { background: #1e5f9a; }
  .export-btn:disabled { background: #90b8d8; cursor: not-allowed; }

  .hint { font-size: 11px; color: #bbb; line-height: 1.5; text-align: center; }
  .divider { height: 1px; background: #f0f0f0; }

  /* ── PREVIEW ── */
  .preview-area {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 10px;
    min-width: 0;
  }

  .preview-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: #999;
  }

  .scale-wrapper { overflow: hidden; }

  /* Card: 958×610 (2× of 479×305) */
  .card {
    width: 958px; height: 610px;
    background: #ffffff;
    position: relative; overflow: hidden;
    transform-origin: top left;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210,228,245,0.5) 0%, rgba(255,255,255,0) 70%);
    pointer-events: none;
  }

  .card-left {
    position: absolute;
    left: 56px; top: 0; bottom: 0; width: 420px;
    display: flex; flex-direction: column; justify-content: center;
  }

  .card-accent {
    width: 40px; height: 4px;
    background: #2a7bbf; border-radius: 2px;
    margin-bottom: 22px; flex-shrink: 0;
  }

  .card-title {
    font-size: 40px; font-weight: 900;
    line-height: 1.1; color: #111111;
    letter-spacing: -0.01em;
  }

  .card-location {
    position: absolute;
    bottom: 42px; left: 56px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-location span { font-size: 16px; font-weight: 400; color: #555; }

  /* Circle: diameter 380, centered vertically at 610/2=305, so top = 305-190 = 115 */
  .card-circle {
    position: absolute;
    right: -28px; top: 115px;
    width: 380px; height: 380px;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 6px 32px rgba(0,0,0,0.13);
  }
  .card-circle img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
  }
</style>
</head>
<body>

<!-- EDITOR -->
<div class="editor">
  <div class="editor-title">Generator grafiki dla wizytówki<br>Bartosz Drobina</div>

  <div>
    <label>Tytuł grafiki</label>
    <textarea id="title-input" placeholder="Wpisz tytuł posta...">Fizjoterapia w leczeniu zawrotów głowy – błędnik czy mięśnie?</textarea>
  </div>

  <div class="divider"></div>

  <div>
    <label>Wybierz zdjęcie</label>
    <div class="photo-grid" id="photo-grid"></div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="divider"></div>

  <button class="export-btn" onclick="exportPNG()">⬇ Pobierz PNG (958×610)</button>
  <p class="hint">Podgląd aktualizuje się na żywo.<br>Kliknij zdjęcie żeby wybrać lub wgraj własne.</p>
</div>

<!-- PREVIEW -->
<div class="preview-area">
  <div class="preview-label">Podgląd grafiki</div>
  <div class="scale-wrapper" id="scale-wrapper">
    <div class="card" id="card">
      <div class="card-left">
        <div class="card-accent"></div>
        <div class="card-title" id="card-title-el">Fizjoterapia w leczeniu zawrotów głowy – błędnik czy mięśnie?</div>
      </div>
      <div class="card-location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#2a7bbf"/>
        </svg>
        <span>Piątkowska 125b/3, Poznań</span>
      </div>
      <div class="card-circle">
        <img id="card-photo" src="uploads/2024-05-20-1.webp" alt="">
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const PHOTOS = [
  { src: 'uploads/2024-05-20-1.webp',      label: 'Kolano' },
  { src: 'uploads/2024-05-26.webp',         label: 'Plecy' },
  { src: 'uploads/2024-05-14-1.webp',       label: 'Szyja' },
  { src: 'uploads/IMG_6929(1)-1.webp',      label: 'Nadgarstek' },
  { src: 'uploads/2024-06-26-1.webp',       label: 'Gabinet' },
  { src: 'uploads/2024-05-12.webp',         label: 'Masaż 1' },
  { src: 'uploads/2024-05-12 (1)-1.webp',   label: 'Masaż 2' },
  { src: 'uploads/2024-05-14.webp',         label: 'Szyja 2' },
  { src: 'uploads/img_6929.webp',           label: 'Narzędzie' },
  { src: 'uploads/photo-1776535144864.webp', label: 'Portret' },
];

let currentPhotoEl = null;

function buildPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';

  PHOTOS.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-option' + (i === 0 ? ' selected' : '');
    div.innerHTML = `<img src="${p.src}" alt="${p.label}" onerror="this.parentElement.style.display='none'">
      <div class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    div.addEventListener('click', () => selectPhoto(p.src, div));
    grid.appendChild(div);
  });

  // Upload button
  const uploadLabel = document.createElement('label');
  uploadLabel.className = 'upload-btn';
  uploadLabel.htmlFor = 'file-input';
  uploadLabel.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Własne`;
  grid.appendChild(uploadLabel);
}

function selectPhoto(src, el) {
  document.getElementById('card-photo').src = src;
  document.querySelectorAll('.photo-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);

  const grid = document.getElementById('photo-grid');
  const uploadBtn = grid.lastElementChild;
  const prev = document.getElementById('custom-opt');
  if (prev) prev.remove();

  const div = document.createElement('div');
  div.className = 'photo-option selected';
  div.id = 'custom-opt';
  div.innerHTML = `<img src="${url}" alt="Własne">
    <div class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
  div.addEventListener('click', () => selectPhoto(url, div));
  grid.insertBefore(div, uploadBtn);
  selectPhoto(url, div);
});

document.getElementById('title-input').addEventListener('input', function() {
  document.getElementById('card-title-el').textContent = this.value;
});

function scaleCard() {
  const availW = window.innerWidth - 300 - 28*3;
  const availH = window.innerHeight - 56 - 28*2;
  const scale = Math.min(availW / 958, availH / 610, 1);
  document.getElementById('card').style.transform = `scale(${scale})`;
  document.getElementById('scale-wrapper').style.width  = (958 * scale) + 'px';
  document.getElementById('scale-wrapper').style.height = (610 * scale) + 'px';
}
window.addEventListener('resize', scaleCard);
scaleCard();
buildPhotoGrid();

// ── Export ──
async function exportPNG() {
  const btn = document.querySelector('.export-btn');
  btn.textContent = '⏳ Generuję...';
  btn.disabled = true;

  const card = document.getElementById('card');
  const clone = card.cloneNode(true);
  clone.style.transform = 'none';
  clone.style.position = 'fixed';
  clone.style.top = '-700px';
  clone.style.left = '0';
  clone.style.width = '958px';
  clone.style.height = '610px';
  clone.style.zIndex = '-999';
  document.body.appendChild(clone);

  await new Promise(r => setTimeout(r, 200));

  try {
    const canvas = await html2canvas(clone, {
      width: 958, height: 610, scale: 1,
      useCORS: true, allowTaint: true, logging: false,
      scrollX: 0, scrollY: 700,
    });

    const title = document.getElementById('title-input').value.slice(0, 50)
      .replace(/[^\w\sąćęłńóśźżĄĆĘŁŃÓŚŹŻ–-]/g, '').trim() || 'grafika';
    const link = document.createElement('a');
    link.download = title + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    document.body.removeChild(clone);
    btn.textContent = '⬇ Pobierz PNG (958×610)';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
